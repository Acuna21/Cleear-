<div
  class="ui-input"
  [ngClass]="[size, appearance, invalid ? 'invalid' : '']"
>
  <label *ngIf="label" class="label">{{ label }}</label>

  <input
    class="control"
    [type]="type"
    [placeholder]="placeholder"
    [value]="value"
    [disabled]="disabled"
    (input)="handleInput($event)"
    (blur)="onTouched()"
  />
</div>
