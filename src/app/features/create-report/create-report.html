<div class="container">
  <div class="header">
    <h2>Gestiona tu reporte</h2>
    <span>
      Completa los siguientes campos para registrar el incidente de manera rápida y eficiente.
    </span>
  </div>

  <form [formGroup]="reportForm" (ngSubmit)="submit()">
    <section class="section">
      <h4>¿Cuál es el problema?</h4>
      
      <app-ui-text-area
        formControlName="description"
        label="Descripción"
        placeholder="Escribe aquí todos los detalles del incidente..."
        [rows]="4"
      />
    </section>

    <section class="section">
      <h4>Ubicación del incidente</h4>

      <div class="row">
          <ui-select
          formControlName="floor"
          label="Piso"
          [options]="[
              { label: 'Piso 1', value: '1' },
              { label: 'Piso 2', value: '2' },
              { label: 'Piso 3', value: '3' },
              { label: 'Piso 4', value: '4' },
              { label: 'Piso 5', value: '5' }
          ]"
          size="sm"/>

          <ui-select
          formControlName="space"
          label="Espacio"
          [options]="[
              { label: 'Espacio 1', value: '1' },
              { label: 'Espacio 2', value: '2' },
              { label: 'Espacio 3', value: '3' },
              { label: 'Espacio 4', value: '4' },
              { label: 'Espacio 5', value: '5' }
          ]" size="sm"/>
      </div>
    </section>

    <section class="section">
      <h4>Adjuntar evidencia</h4>

      <ui-file-upload
        formControlName="files"
        label="Fotos o documentos relacionados"
        [multiple]="true"
      />
    </section>

    <div>
        <app-button
          type="submit"
          size="lg"
          icon="fa-solid fa-paper-plane"
          iconPosition="right"
          [disabled]="reportForm.invalid">
          Enviar Reporte
        </app-button>
    </div>
      

  </form>
</div>
